name: Vistrea Studio macOS release

on:
  push:
    tags:
      - "studio-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Ad-hoc packaging version (x.y.z)"
        required: true
        default: "0.1.0"

concurrency:
  # Every tag updates one public appcast. Serialize the entire release lane so
  # an older version can never finish after and overwrite a newer feed.
  group: studio-macos-release
  cancel-in-progress: false

jobs:
  package:
    runs-on: macos-15
    permissions:
      contents: write
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      is_release: ${{ steps.metadata.outputs.is_release }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve release metadata
        id: metadata
        shell: bash
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            [[ "$GITHUB_REF_NAME" =~ ^studio-v((0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))$ ]] || {
              echo "Tag must be studio-vx.y.z" >&2
              exit 1
            }
            version="${BASH_REMATCH[1]}"
            is_release=true
            tag="$GITHUB_REF_NAME"
          else
            [[ "$MANUAL_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || {
              echo "Manual version must be x.y.z" >&2
              exit 1
            }
            version="$MANUAL_VERSION"
            is_release=false
            tag=""
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Validate monotonic release version
        if: steps.metadata.outputs.is_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          published_tags="$RUNNER_TEMP/vistrea-studio-published-tags.txt"
          gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --exclude-drafts \
            --limit 1000 \
            --json tagName \
            --jq '.[].tagName' > "$published_tags"
          node tools/release/validate-studio-release-version.mjs \
            --candidate "$VERSION" \
            --published-tags-file "$published_tags"

      - name: Verify release configuration
        if: steps.metadata.outputs.is_release == 'true'
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.VISTREA_SPARKLE_PRIVATE_KEY }}
          SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
          SPARKLE_PUBLIC_KEY: ${{ vars.VISTREA_SPARKLE_PUBLIC_KEY }}
        run: |
          missing=()
          [[ -n "$CERTIFICATE_BASE64" ]] || missing+=(MACOS_DEVELOPER_ID_CERTIFICATE_BASE64)
          [[ -n "$CERTIFICATE_PASSWORD" ]] || missing+=(MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD)
          [[ -n "$KEYCHAIN_PASSWORD" ]] || missing+=(MACOS_KEYCHAIN_PASSWORD)
          [[ -n "$NOTARY_KEY_BASE64" ]] || missing+=(APPLE_NOTARY_KEY_BASE64)
          [[ -n "$NOTARY_KEY_ID" ]] || missing+=(APPLE_NOTARY_KEY_ID)
          [[ -n "$NOTARY_ISSUER_ID" ]] || missing+=(APPLE_NOTARY_ISSUER_ID)
          [[ -n "$SPARKLE_PRIVATE_KEY" ]] || missing+=(VISTREA_SPARKLE_PRIVATE_KEY)
          [[ -n "$SIGNING_IDENTITY" ]] || missing+=(MACOS_SIGNING_IDENTITY)
          [[ -n "$SPARKLE_PUBLIC_KEY" ]] || missing+=(VISTREA_SPARKLE_PUBLIC_KEY)
          if [[ ${#missing[@]} -ne 0 ]]; then
            printf 'Missing release configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Resolve Swift dependencies
        run: swift package --package-path apps/studio-macos resolve

      - name: Install Host dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded Host
        run: pnpm build:host

      - name: Test Studio
        run: swift test --package-path apps/studio-macos

      - name: Import Developer ID and notarization credentials
        if: steps.metadata.outputs.is_release == 'true'
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: |
          certificate="$RUNNER_TEMP/vistrea-developer-id.p12"
          keychain="$RUNNER_TEMP/vistrea-release.keychain-db"
          notary_key="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$certificate"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 -D > "$notary_key"
          chmod 600 "$certificate" "$notary_key"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" -k "$keychain" -P "$CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain"
          security list-keychains -d user -s "$keychain"
          echo "VISTREA_RELEASE_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          echo "VISTREA_NOTARY_KEY_FILE=$notary_key" >> "$GITHUB_ENV"

      - name: Package Studio
        id: package
        shell: bash
        env:
          IS_RELEASE: ${{ steps.metadata.outputs.is_release }}
          VERSION: ${{ steps.metadata.outputs.version }}
          SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
          SPARKLE_PUBLIC_KEY: ${{ vars.VISTREA_SPARKLE_PUBLIC_KEY }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          output="$RUNNER_TEMP/vistrea-studio-release"
          mkdir -p "$output"
          if [[ "$IS_RELEASE" == "true" ]]; then
            VISTREA_CODESIGN_IDENTITY="$SIGNING_IDENTITY" \
            VISTREA_NOTARY_KEY_FILE="$VISTREA_NOTARY_KEY_FILE" \
            VISTREA_NOTARY_KEY_ID="$NOTARY_KEY_ID" \
            VISTREA_NOTARY_ISSUER_ID="$NOTARY_ISSUER_ID" \
              tools/release/package-studio-macos.sh \
                --version "$VERSION" \
                --build-number "$VERSION" \
                --output-dir "$output" \
                --sparkle-feed-url "https://lllllayer.github.io/vistrea/appcast.xml" \
                --sparkle-public-key "$SPARKLE_PUBLIC_KEY" \
                --require-distribution
          else
            tools/release/package-studio-macos.sh \
              --version "$VERSION" \
              --build-number "$VERSION" \
              --output-dir "$output"
          fi
          echo "output=$output" >> "$GITHUB_OUTPUT"

      - name: Generate signed Sparkle appcast
        if: steps.metadata.outputs.is_release == 'true'
        shell: bash
        env:
          VISTREA_SPARKLE_PRIVATE_KEY: ${{ secrets.VISTREA_SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.metadata.outputs.version }}
          TAG: ${{ steps.metadata.outputs.tag }}
          OUTPUT: ${{ steps.package.outputs.output }}
        run: |
          tools/release/generate-studio-appcast.sh \
            --archive "$OUTPUT/Vistrea-Studio-$VERSION.zip" \
            --tag "$TAG" \
            --output "$OUTPUT/appcast.xml"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Vistrea-Studio-${{ steps.metadata.outputs.version }}
          path: ${{ steps.package.outputs.output }}
          if-no-files-found: error

      - name: Create draft GitHub release
        if: steps.metadata.outputs.is_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          OUTPUT: ${{ steps.package.outputs.output }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG" --json isDraft --jq .isDraft)"
            [[ "$is_draft" == "true" ]] || {
              echo "Refusing to replace an already published release." >&2
              exit 1
            }
            gh release upload "$TAG" \
              "$OUTPUT/Vistrea-Studio-$VERSION.zip" \
              "$OUTPUT/Vistrea-Studio-$VERSION.dmg" \
              "$OUTPUT/SHA256SUMS" \
              "$OUTPUT/appcast.xml" \
              --clobber
          else
            gh release create "$TAG" \
              "$OUTPUT/Vistrea-Studio-$VERSION.zip" \
              "$OUTPUT/Vistrea-Studio-$VERSION.dmg" \
              "$OUTPUT/SHA256SUMS" \
              "$OUTPUT/appcast.xml" \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "Vistrea Studio $VERSION"
          fi

      - name: Prepare update feed site
        if: steps.metadata.outputs.is_release == 'true'
        shell: bash
        env:
          OUTPUT: ${{ steps.package.outputs.output }}
        run: |
          site="$RUNNER_TEMP/vistrea-studio-update-feed"
          mkdir -p "$site"
          cp "$OUTPUT/appcast.xml" "$site/appcast.xml"
          cp tools/release/studio-update-feed-index.html "$site/index.html"
          echo "VISTREA_UPDATE_SITE=$site" >> "$GITHUB_ENV"

      - name: Upload GitHub Pages artifact
        if: steps.metadata.outputs.is_release == 'true'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ${{ env.VISTREA_UPDATE_SITE }}

      - name: Remove temporary signing keychain
        if: always() && steps.metadata.outputs.is_release == 'true'
        shell: bash
        run: |
          if [[ -n "${VISTREA_RELEASE_KEYCHAIN:-}" && -f "$VISTREA_RELEASE_KEYCHAIN" ]]; then
            security delete-keychain "$VISTREA_RELEASE_KEYCHAIN"
          fi

  publish-release:
    if: needs.package.outputs.is_release == 'true'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.package.outputs.tag }}
        run: gh release edit "$TAG" --draft=false

  deploy-update-feed:
    if: needs.package.outputs.is_release == 'true'
    needs:
      - package
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy signed update feed
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
