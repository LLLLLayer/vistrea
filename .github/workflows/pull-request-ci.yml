name: Pull request CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  node-host:
    name: Node and Host
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the complete Host gate
        run: pnpm check

  studio:
    name: Vistrea Studio
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Host dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the managed Host
        run: pnpm build:host

      - name: Test Studio
        run: swift test --package-path apps/studio-macos

      - name: Verify Node and Swift Runtime interoperability
        run: node --test .build/typescript/tests/integration/ios-runtime-client-interop.test.js

      - name: Build Studio in Release configuration
        run: swift build -c release --package-path apps/studio-macos

  ios-sdk:
    name: iOS SDK
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test the iOS SDK
        run: swift test --package-path sdks/ios

      - name: Build the iOS SDK in Release configuration
        run: swift build -c release --package-path sdks/ios

  ios-demo:
    name: iOS Demo App
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pinned XcodeGen
        run: |
          tools/ci/install-xcodegen.sh "$RUNNER_TEMP/xcodegen"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Generate the Xcode project
        working-directory: examples/ios/VistreaDemoApp
        run: xcodegen generate

      - name: Verify the generated Xcode project is current
        working-directory: examples/ios/VistreaDemoApp
        run: |
          git diff --exit-code -- VistreaDemoApp.xcodeproj
          [[ -z "$(git status --short --untracked-files=all -- VistreaDemoApp.xcodeproj)" ]]

      - name: Select an available iPhone Simulator
        run: |
          xcrun simctl list devices available --json > "$RUNNER_TEMP/simulators.json"
          simulator_id="$(python3 - "$RUNNER_TEMP/simulators.json" <<'PY'
          import json
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              devices_by_runtime = json.load(source)["devices"]

          def runtime_version(identifier):
              match = re.search(r"iOS-(\d+)-(\d+)", identifier)
              return tuple(map(int, match.groups())) if match else (-1, -1)

          for runtime in sorted(devices_by_runtime, key=runtime_version, reverse=True):
              if "iOS-" not in runtime:
                  continue
              for device in devices_by_runtime[runtime]:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)

          raise SystemExit("No available iPhone Simulator was found")
          PY
          )"
          echo "IOS_SIMULATOR_ID=$simulator_id" >> "$GITHUB_ENV"

      - name: Test the iOS Demo App
        working-directory: examples/ios/VistreaDemoApp
        run: |
          xcodebuild \
            -project VistreaDemoApp.xcodeproj \
            -scheme VistreaDemoApp \
            -destination "platform=iOS Simulator,id=$IOS_SIMULATOR_ID" \
            -derivedDataPath "$RUNNER_TEMP/VistreaDemoApp-DerivedData" \
            test

      - name: Build the iOS Demo App in Release configuration
        working-directory: examples/ios/VistreaDemoApp
        run: |
          xcodebuild \
            -project VistreaDemoApp.xcodeproj \
            -scheme VistreaDemoApp \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/VistreaDemoApp-Release-DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

  android-sdk:
    name: Android SDK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            sdks/android/*.gradle.kts
            sdks/android/gradle.properties
            sdks/android/gradle/libs.versions.toml
            sdks/android/gradle/wrapper/gradle-wrapper.properties

      - name: Install Android API 36
        run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "platforms;android-36"
          "build-tools;36.0.0"

      - name: Build the Host interoperability fixture
        run: |
          pnpm install --frozen-lockfile
          pnpm build:host

      - name: Test and build the Android SDK
        working-directory: sdks/android
        run: |
          ./gradlew \
            test \
            :runtime-connection:testDebugUnitTest \
            :runtime-android:assembleDebug \
            :runtime-android:assembleRelease \
            :runtime-android:lintDebug \
            :runtime-compose:test \
            :runtime-compose:assembleRelease \
            :runtime-compose:lintDebug

      - name: Verify Node and Kotlin Runtime interoperability
        run: node --test .build/typescript/tests/integration/android-runtime-client-interop.test.js

      - name: Verify the Android Release boundary
        working-directory: sdks/android
        run: ./tools/verify-runtime-release-boundary.sh

  android-demo:
    name: Android Demo App
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            examples/android/VistreaDemoApp/*.gradle.kts
            examples/android/VistreaDemoApp/gradle.properties
            examples/android/VistreaDemoApp/gradle/libs.versions.toml
            examples/android/VistreaDemoApp/gradle/wrapper/gradle-wrapper.properties

      - name: Install Android API 36
        run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "platforms;android-36"
          "build-tools;36.0.0"

      - name: Test and build the Android Demo App
        working-directory: examples/android/VistreaDemoApp
        run: ./gradlew assembleDebug assembleRelease test lintDebug
