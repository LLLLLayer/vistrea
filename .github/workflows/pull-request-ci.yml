name: Pull request CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  node-host:
    name: Node and Host
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      # Android interoperability runs after a warmed Gradle build in the
      # dedicated Android SDK job; keep this Host gate toolchain-isolated.
      VISTREA_SKIP_ANDROID_RUNTIME_INTEROP: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the complete Host gate
        run: pnpm check

  studio:
    name: Vistrea Studio
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Host dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the managed Host
        run: pnpm build:host

      - name: Report the Studio snapshot environment
        env:
          SNAPSHOT_ARTIFACTS: ${{ runner.temp }}/VistreaStudioSnapshotDiffs
        run: |
          mkdir -p "$SNAPSHOT_ARTIFACTS"
          sw_vers | tee "$SNAPSHOT_ARTIFACTS/environment.txt"
          uname -m | tee -a "$SNAPSHOT_ARTIFACTS/environment.txt"
          xcodebuild -version | tee -a "$SNAPSHOT_ARTIFACTS/environment.txt"

      - name: Test Studio
        env:
          VISTREA_REQUIRE_STUDIO_SNAPSHOTS: "1"
          VISTREA_STUDIO_SNAPSHOT_ARTIFACTS_DIR: ${{ runner.temp }}/VistreaStudioSnapshotDiffs
        run: swift test --package-path apps/studio-macos

      - name: Verify Node and Swift Runtime interoperability
        run: node --test .build/typescript/tests/integration/ios-runtime-client-interop.test.js

      - name: Build Studio in Release configuration
        run: swift build -c release --package-path apps/studio-macos

      - name: Upload Studio snapshot failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Vistrea-Studio-Snapshot-Failure-${{ runner.os }}-${{ runner.arch }}
          path: ${{ runner.temp }}/VistreaStudioSnapshotDiffs
          if-no-files-found: warn
          retention-days: 14

  studio-ui:
    name: Vistrea Studio UI regression
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pinned XcodeGen
        run: tools/ci/install-xcodegen.sh "$RUNNER_TEMP/xcodegen"

      - name: Report the Studio UI environment
        run: |
          sw_vers | tee "$RUNNER_TEMP/studio-ui-environment.txt"
          uname -m | tee -a "$RUNNER_TEMP/studio-ui-environment.txt"
          xcodebuild -version | tee -a "$RUNNER_TEMP/studio-ui-environment.txt"

      - name: Generate the Studio UI regression project
        run: |
          "$RUNNER_TEMP/xcodegen/bin/xcodegen" generate \
            --spec tests/studio-macos-ui/project.yml \
            --project tests/studio-macos-ui

      - name: Build Studio UI regression for testing
        run: |
          set -o pipefail
          xcodebuild \
            -project tests/studio-macos-ui/VistreaStudioUIRegression.xcodeproj \
            -scheme VistreaStudioUIRegression \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/VistreaStudioUI-DerivedData" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/VistreaStudioUI-Packages" \
            -resultBundlePath "$RUNNER_TEMP/VistreaStudioUI-Build.xcresult" \
            -parallel-testing-enabled NO \
            build-for-testing \
            | tee "$RUNNER_TEMP/studio-ui-build.log"

      - name: Run Studio UI regression
        run: |
          set -o pipefail
          xcodebuild \
            -project tests/studio-macos-ui/VistreaStudioUIRegression.xcodeproj \
            -scheme VistreaStudioUIRegression \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/VistreaStudioUI-DerivedData" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/VistreaStudioUI-Packages" \
            -resultBundlePath "$RUNNER_TEMP/VistreaStudioUI-Tests.xcresult" \
            -parallel-testing-enabled NO \
            test-without-building \
            | tee "$RUNNER_TEMP/studio-ui-tests.log"

      - name: Export Studio UI regression evidence
        if: always()
        run: |
          result="$RUNNER_TEMP/VistreaStudioUI-Tests.xcresult"
          if [[ -d "$result" ]]; then
            xcrun xcresulttool get test-results summary \
              --path "$result" \
              > "$RUNNER_TEMP/studio-ui-test-summary.json" || true
            xcrun xcresulttool get test-results tests \
              --path "$result" \
              > "$RUNNER_TEMP/studio-ui-tests.json" || true
            xcrun xcresulttool export attachments \
              --path "$result" \
              --output-path "$RUNNER_TEMP/studio-ui-attachments" || true
            xcrun xcresulttool export diagnostics \
              --path "$result" \
              --output-path "$RUNNER_TEMP/studio-ui-diagnostics" || true
          fi

      - name: Upload Studio UI regression evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Vistrea-Studio-UI-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ runner.temp }}/VistreaStudioUI-Build.xcresult
            ${{ runner.temp }}/VistreaStudioUI-Tests.xcresult
            ${{ runner.temp }}/studio-ui-attachments
            ${{ runner.temp }}/studio-ui-diagnostics
            ${{ runner.temp }}/studio-ui-environment.txt
            ${{ runner.temp }}/studio-ui-test-summary.json
            ${{ runner.temp }}/studio-ui-tests.json
            ${{ runner.temp }}/studio-ui-build.log
            ${{ runner.temp }}/studio-ui-tests.log
          if-no-files-found: warn
          retention-days: 14

  ios-sdk:
    name: iOS SDK
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test the iOS SDK
        run: swift test --package-path sdks/ios

      - name: Build the iOS SDK in Release configuration
        run: swift build -c release --package-path sdks/ios

  ios-demo:
    name: iOS Demo App
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pinned XcodeGen
        run: |
          tools/ci/install-xcodegen.sh "$RUNNER_TEMP/xcodegen"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Generate the Xcode project
        working-directory: examples/ios/VistreaDemoApp
        run: xcodegen generate

      - name: Verify the generated Xcode project is current
        working-directory: examples/ios/VistreaDemoApp
        run: |
          git diff --exit-code -- VistreaDemoApp.xcodeproj
          [[ -z "$(git status --short --untracked-files=all -- VistreaDemoApp.xcodeproj)" ]]

      - name: Select an available iPhone Simulator
        run: |
          xcrun simctl list devices available --json > "$RUNNER_TEMP/simulators.json"
          simulator_id="$(python3 - "$RUNNER_TEMP/simulators.json" <<'PY'
          import json
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              devices_by_runtime = json.load(source)["devices"]

          def runtime_version(identifier):
              match = re.search(r"iOS-(\d+)-(\d+)", identifier)
              return tuple(map(int, match.groups())) if match else (-1, -1)

          for runtime in sorted(devices_by_runtime, key=runtime_version, reverse=True):
              if "iOS-" not in runtime:
                  continue
              for device in devices_by_runtime[runtime]:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)

          raise SystemExit("No available iPhone Simulator was found")
          PY
          )"
          echo "IOS_SIMULATOR_ID=$simulator_id" >> "$GITHUB_ENV"

      - name: Test the iOS Demo App
        working-directory: examples/ios/VistreaDemoApp
        run: |
          xcodebuild \
            -project VistreaDemoApp.xcodeproj \
            -scheme VistreaDemoApp \
            -destination "platform=iOS Simulator,id=$IOS_SIMULATOR_ID" \
            -derivedDataPath "$RUNNER_TEMP/VistreaDemoApp-DerivedData" \
            test

      - name: Build the iOS Demo App in Release configuration
        working-directory: examples/ios/VistreaDemoApp
        run: |
          xcodebuild \
            -project VistreaDemoApp.xcodeproj \
            -scheme VistreaDemoApp \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/VistreaDemoApp-Release-DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

  android-sdk:
    name: Android SDK
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            sdks/android/*.gradle.kts
            sdks/android/gradle.properties
            sdks/android/gradle/libs.versions.toml
            sdks/android/gradle/wrapper/gradle-wrapper.properties

      - name: Install Android API 36
        run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "platforms;android-36"
          "build-tools;36.0.0"

      - name: Build the Host interoperability fixture
        run: |
          pnpm install --frozen-lockfile
          pnpm build:host

      - name: Test and build the Android SDK
        working-directory: sdks/android
        run: |
          ./gradlew \
            test \
            :runtime-connection:testDebugUnitTest \
            :runtime-android:assembleDebug \
            :runtime-android:assembleRelease \
            :runtime-android:lintDebug \
            :runtime-compose:test \
            :runtime-compose:assembleRelease \
            :runtime-compose:lintDebug

      - name: Verify Node and Kotlin Runtime interoperability
        run: node --test .build/typescript/tests/integration/android-runtime-client-interop.test.js

      - name: Verify the Android Release boundary
        working-directory: sdks/android
        run: ./tools/verify-runtime-release-boundary.sh

  android-demo:
    name: Android Demo App
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            examples/android/VistreaDemoApp/*.gradle.kts
            examples/android/VistreaDemoApp/gradle.properties
            examples/android/VistreaDemoApp/gradle/libs.versions.toml
            examples/android/VistreaDemoApp/gradle/wrapper/gradle-wrapper.properties

      - name: Install Android API 36
        run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "platforms;android-36"
          "build-tools;36.0.0"

      - name: Test and build the Android Demo App
        working-directory: examples/android/VistreaDemoApp
        run: ./gradlew assembleDebug assembleRelease test lintDebug
